services:
  - type: web
    name: conservatwin-plc-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://hmi-sepia.vercel.app,http://localhost:3000
